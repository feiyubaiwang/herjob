                    <div class="relative z-10">
                        <p class="text-xl md:text-2xl text-primary font-serif italic mb-8 leading-relaxed">“${maxProfile.character.quote}”</p>
                        <div class="mb-6 flex flex-wrap items-end gap-3">
                            <h4 class="text-3xl font-serif text-white font-bold tracking-wide">${maxProfile.character.name}</h4>
                            <span class="text-sm text-zinc-400 bg-black px-3 py-1 rounded-sm border border-zinc-800 tracking-widest uppercase mb-1">《${maxProfile.character.movie}》</span>
                        </div>
                        <div class="text-zinc-400 leading-relaxed text-justify space-y-2 text-base md:text-lg">
                            <p>${maxProfile.character.desc}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderChart() {
            try {
                const canvas = document.getElementById('radarChart');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                if (radarChartInstance) {
                    radarChartInstance.destroy();
                }

                Chart.defaults.color = '#71717a'; // zinc-500
                Chart.defaults.font.family = '"Noto Serif SC", serif';

                radarChartInstance = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: ['现实型', '研究型', '艺术型', '社会型', '企业型', '常规型'],
                        datasets: [{
                            label: '特质强度',
                            data: [scores.R, scores.I, scores.A, scores.S, scores.E, scores.C],
                            backgroundColor: 'rgba(217, 52, 37, 0.2)', // primary transparent
                            borderColor: '#D93425', // primary
                            pointBackgroundColor: '#0a0a0a',
                            pointBorderColor: '#D93425',
                            pointHoverBackgroundColor: '#D93425',
                            pointHoverBorderColor: '#fff',
                            borderWidth: 2,
                            pointRadius: 4,
                            pointBorderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            r: {
                                angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                pointLabels: {
                                    color: '#e5e5e5',
                                    font: { size: 14, weight: 'bold' }
                                },
                                ticks: {
                                    display: false, // 隐藏具体分数刻度，更显高级
                                    min: 0,
                                    max: 25 // 5题 * 5分 = 25分满分
                                }
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(23, 23, 23, 0.9)',
                                titleColor: '#D93425',
                                bodyColor: '#e5e5e5',
                                borderColor: '#333',
                                borderWidth: 1,
                                padding: 10,
                                displayColors: false,
                                callbacks: {
                                    label: function(context) {
                                        return `契合指数: ${context.raw} / 25`;
                                    }
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.warn('图表渲染保护：', error);
            }
        }

        function restartTest() {
            switchScreen(screenResult, screenStart);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            // 修复：确保回到首页时选项按钮的点击事件被正确还原
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.style.pointerEvents = 'auto');
        }
    </script>
</body>
</html>
