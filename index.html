<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的电影职业人格</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- 备用 CDN 源 -->
    <script>
        if (typeof Chart === 'undefined') {
            var script = document.createElement('script');
            script.src = 'https://unpkg.com/chart.js@4.4.1/dist/chart.umd.min.js';
            document.head.appendChild(script);
        }
    </script>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#D93425',
                        darkbg: '#0a0a0a',
                        surface: '#171717',
                    },
                    fontFamily: {
                        serif: ['"Noto Serif SC"', 'serif'],
                        sans: ['system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            font-family: 'system-ui', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, h3, .font-serif {
            font-family: '"Noto Serif SC"', serif;
        }
        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
        }
        .hidden-screen {
            display: none !important;
        }
        .option-btn {
            transition: all 0.3s ease;
            border: 1px solid #333;
        }
        .option-btn:hover {
            border-color: #D93425;
            background-color: rgba(217, 52, 37, 0.1);
        }
        .score-1:hover { border-color: #4b5563; background: rgba(75, 85, 99, 0.1); }
        .score-5:hover { border-color: #D93425; background: rgba(217, 52, 37, 0.15); box-shadow: 0 0 10px rgba(217,52,37,0.3); }
        
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #333;
            border-bottom-color: #D93425;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .movie-title-highlight {
            color: #D93425;
            font-weight: 600;
            font-style: italic;

</head>
<body class="min-h-screen flex flex-col justify-center items-center p-4 selection:bg-primary selection:text-white">

    <main class="w-full max-w-2xl relative">
        
        <!-- ================= 屏幕 1：欢迎页 ================= -->
        <section id="screen-start" class="fade-enter fade-enter-active text-center py-12">
            <div class="mb-8 inline-block">
                <h1 class="text-4xl md:text-5xl font-serif font-bold text-white tracking-widest mb-4">你是哪位职业女性？</h1>
            </div>
            <div class="space-y-6 text-zinc-400 text-sm md:text-base leading-relaxed max-w-lg mx-auto mb-12">
                <p>回答30个电影情境问题，我会为你生成一份职业性格分析报告。</p>
            </div>
            <button onclick="startTest()" class="group relative px-8 py-3 bg-transparent text-primary font-serif font-semibold tracking-wider uppercase overflow-hidden border border-primary hover:bg-primary hover:text-white transition-all duration-500 shadow-[0_0_15px_rgba(217,52,37,0.2)] hover:shadow-[0_0_25px_rgba(217,52,37,0.5)]">
                抽取你的剧本
            </button>
        </section>

        <!-- ================= 屏幕 2：测试答题页 ================= -->
        <section id="screen-quiz" class="hidden-screen fade-enter">

                <div id="progress-bar" class="h-full bg-primary transition-all duration-300 w-0"></div>
            </div>
            
            <div class="text-center mb-10">
                <span class="text-primary font-serif font-bold text-xl block mb-2 tracking-widest" id="question-number">01 / 30</span>

                        <!-- 问题文本 -->
                    </h2>
                </div>
            </div>

            <!-- 选项 -->
            <div id="options-container" class="flex flex-col space-y-3 max-w-md mx-auto">
                <button onclick="answerQuestion(5)" class="option-btn score-5 w-full py-4 px-6 rounded text-left text-zinc-200 flex justify-between items-center group">
                    <span class="font-serif">这简直就是我，完全代入</span>
                    <span class="w-3 h-3 rounded-full bg-zinc-700 group-hover:bg-primary transition-colors"></span>
                </button>
                <button onclick="answerQuestion(4)" class="option-btn w-full py-4 px-6 rounded text-left text-zinc-300 flex justify-between items-center group">
                    <span class="font-serif">很符合我的直觉</span>
                    <span class="w-3 h-3 rounded-full bg-zinc-700 group-hover:bg-zinc-400 transition-colors"></span>
                </button>
                <button onclick="answerQuestion(3)" class="option-btn w-full py-4 px-6 rounded text-left text-zinc-400 flex justify-between items-center group">
                    <span class="font-serif">看情况，不一定</span>
                    <span class="w-3 h-3 rounded-full bg-zinc-700 group-hover:bg-zinc-500 transition-colors"></span>
                </button>
                <button onclick="answerQuestion(2)" class="option-btn w-full py-4 px-6 rounded text-left text-zinc-400 flex justify-between items-center group">
                    <span class="font-serif">不太像我的行事作风</span>
                    <span class="w-3 h-3 rounded-full bg-zinc-700 group-hover:bg-zinc-500 transition-colors"></span>
                </button>
                <button onclick="answerQuestion(1)" class="option-btn score-1 w-full py-4 px-6 rounded text-left text-zinc-500 flex justify-between items-center group">
                    <span class="font-serif">这绝对不是我的剧本</span>
                    <span class="w-3 h-3 rounded-full bg-zinc-700 group-hover:bg-zinc-600 transition-colors"></span>
                </button>
            </div>
        </section>

        <!-- ================= 屏幕 3：加载计算页 ================= -->
        <section id="screen-loading" class="hidden-screen fade-enter text-center py-20">
            <span class="loader mb-8"></span>
            <h2 class="text-2xl font-serif text-white tracking-widest mb-2">正在深度分析</h2>
            <p class="text-zinc-500 text-sm">多维人格矩阵匹配中...</p>
        </section>

        <!-- ================= 屏幕 4：结果页 ================= -->
        <section id="screen-result" class="hidden-screen fade-enter pb-16">
            <div class="text-center mb-10">
                <p class="text-primary text-sm tracking-[0.3em] uppercase mb-2">你的主导职业类型</p>

            </div>

            <div class="relative w-full max-w-md mx-auto mb-12 bg-surface p-6 rounded-2xl border border-zinc-800 shadow-2xl">

            </div>

            <div id="movie-character-section"></div>

            <div class="text-center mt-12">
                <button onclick="restartTest()" class="text-zinc-500 hover:text-white underline decoration-zinc-700 hover:decoration-primary underline-offset-4 transition-colors font-serif">
                    再次抽取
                </button>
            </div>
        </section>

    </main>

                            backgroundColor: 'rgba(217, 52, 37, 0.2)', 
                            borderColor: '#D93425', 
                            pointBackgroundColor: '#0a0a0a',
                            pointBorderColor: '#D93425',
                            pointHoverBackgroundColor: '#D93425',
                            pointHoverBorderColor: '#fff',
                            borderWidth: 2,
                            pointRadius: 3, 
                            pointBorderWidth: 1 
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: { duration: 700 },
                        scales: {
                            r: {
                                angleLines: { color: 'rgba(255, 255, 255, 0.1)', lineWidth: 1 },
                                grid: { color: 'rgba(255, 255, 255, 0.05)', lineWidth: 1 },
                                pointLabels: { color: '#e5e5e5', font: { size: 11, weight: 'bold' } },
                                ticks: { display: false, min: 0, max: 25 }
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(23, 23, 23, 0.9)',
                                titleColor: '#D93425',
                                bodyColor: '#e5e5e5',
                                borderColor: '#333',
                                borderWidth: 1,
                                padding: 10,
                                displayColors: false,
                                callbacks: {
                                    label: function(context) { return `契合指数: ${context.raw} / 25`; }
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error(error);
            }
        }

        function restartTest() {
            switchScreen(screenResult, screenStart);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.style.pointerEvents = 'auto');
        }
    </script>
</body>
</html>
